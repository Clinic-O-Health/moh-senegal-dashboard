<header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
  <div class="flex items-center justify-between h-16 px-4 lg:px-6">
    <!-- Bouton menu mobile + Logo -->
    <div class="flex items-center gap-4">
      <p-button
        icon="pi pi-bars"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        (onClick)="toggleSidebar.emit()"
        class="lg:hidden"
      />

      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
          <!-- <i class="pi pi-heart text-white text-xl"></i> -->
          <img alt="logo" src="assets/images/logo/logo_transparent.png" />
        </div>
        <div class="hidden sm:block">
          <h1 class="text-lg font-bold text-gray-900">Plateforme Clinic O</h1>
          <!-- <p class="text-xs text-gray-500">Gestion des MNT</p> -->
        </div>
      </div>
    </div>

    <!-- Actions utilisateur -->
    <div class="flex items-center gap-2 md:gap-4">
      <!-- Notifications -->
      <p-button
        icon="pi pi-bell"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        [badge]="unreadCount.toString()"
        badgeSeverity="danger"
        (click)="op.toggle($event)"
      />
      @if(user()){

      <!-- Profil utilisateur -->
      <div
        class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 rounded-lg px-3 py-2 transition-colors"
      >
        <p-avatar
          label="{{ user().first_name | slice : 0 : 1 }}{{ user().last_name | slice : 0 : 1 }}"
          styleClass="bg-indigo-600 text-white"
          shape="circle"
        />
        <div class="hidden md:block">
          <p class="text-sm font-semibold text-gray-900">
            {{ user().first_name }} {{ user().last_name }}
          </p>
          <p class="text-xs text-gray-500">{{ user().role.name }}</p>
        </div>
        <!-- <i class="pi pi-chevron-down text-gray-400 text-xs"></i> -->
      </div>
      }
    </div>
  </div>
</header>

<p-popover #op>
  <div class="notification-panel">
    <!-- Header -->
    <div class="notification-header">
      <div class="flex items-center gap-2">
        <i class="pi pi-bell text-indigo-600"></i>
        <span class="font-semibold text-gray-900 text-lg">Notifications</span>
        <span *ngIf="unreadCount > 0" class="notification-badge">{{ unreadCount }}</span>
      </div>
      <button
        *ngIf="unreadCount > 0"
        (click)="markAllAsRead()"
        class="mark-all-btn"
      >
        <i class="pi pi-check-circle text-xs"></i>
        Tout marquer comme lu
      </button>
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="notification-empty">
      <i class="pi pi-spin pi-spinner text-2xl text-indigo-500"></i>
      <span class="text-sm text-gray-500 mt-2">Chargement...</span>
    </div>

    <!-- Error -->
    <div *ngIf="error && !loading" class="notification-error">
      <i class="pi pi-exclamation-triangle text-orange-500"></i>
      <span class="text-sm text-gray-600">{{ error }}</span>
    </div>

    <!-- Notification list -->
    <ul *ngIf="!loading && notifications.length > 0" class="notification-list">
      <li
        *ngFor="let n of notifications"
        class="notification-item"
        [class.notification-unread]="n.status === 'inbox'"
        (click)="markAsRead(n)"
      >
        <div class="notification-dot" *ngIf="n.status === 'inbox'"></div>
        <div class="notification-icon">
          <i class="pi pi-envelope text-indigo-600"></i>
        </div>
        <div class="notification-content">
          <span class="notification-subject">{{ n.subject }}</span>
          <p class="notification-message" *ngIf="n.message">{{ n.message }}</p>
          <div class="notification-meta">
            <i class="pi pi-clock text-xs"></i>
            <span>{{ n.timestamp | date : 'dd MMM yyyy, HH:mm' }}</span>
          </div>
        </div>
        <button
          class="notification-dismiss"
          (click)="markAsRead(n); $event.stopPropagation()"
          title="Marquer comme lu"
        >
          <i class="pi pi-times"></i>
        </button>
      </li>
    </ul>

    <!-- Empty state -->
    <div *ngIf="!loading && notifications.length === 0 && !error" class="notification-empty">
      <i class="pi pi-inbox text-4xl text-gray-300"></i>
      <span class="text-sm text-gray-400 mt-2">Aucune notification</span>
    </div>
  </div>
</p-popover>

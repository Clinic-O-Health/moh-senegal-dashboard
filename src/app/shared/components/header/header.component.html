<header class="bg-white border-b border-gray-200 sticky top-0 z-40 shadow-sm">
  <div class="flex items-center justify-between h-16 px-4 lg:px-6">
    <!-- Bouton menu mobile + Logo -->
    <div class="flex items-center gap-4">
      <p-button
        icon="pi pi-bars"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        (onClick)="toggleSidebar.emit()"
        class="lg:hidden"
      />

      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
          <!-- <i class="pi pi-heart text-white text-xl"></i> -->
          <img alt="logo" src="assets/images/logo/logo_transparent.png" />
        </div>
        <div class="hidden sm:block">
          <h1 class="text-lg font-bold text-gray-900">Plateforme Clinic O</h1>
          <!-- <p class="text-xs text-gray-500">Gestion des MNT</p> -->
        </div>
      </div>
    </div>

    <!-- Actions utilisateur -->
    <div class="flex items-center gap-2 md:gap-4">
      <!-- Notifications -->
      <!-- <p-button
        icon="pi pi-bell"
        [text]="true"
        [rounded]="true"
        severity="secondary"
        [badge]="'3'"
        badgeSeverity="danger"
        (click)="op.toggle($event)"
      /> -->
      @if(user()){

      <!-- Profil utilisateur -->
      <div
        class="flex items-center gap-3 cursor-pointer hover:bg-gray-50 rounded-lg px-3 py-2 transition-colors"
      >
        <p-avatar
          label="{{ user().first_name | slice : 0 : 1 }}{{ user().last_name | slice : 0 : 1 }}"
          styleClass="bg-indigo-600 text-white"
          shape="circle"
        />
        <div class="hidden md:block">
          <p class="text-sm font-semibold text-gray-900">
            {{ user().first_name }} {{ user().last_name }}
          </p>
          <p class="text-xs text-gray-500">{{ user().role.name }}</p>
        </div>
        <!-- <i class="pi pi-chevron-down text-gray-400 text-xs"></i> -->
      </div>
      }
    </div>
  </div>
</header>

<p-popover #op>
  <div class="flex flex-col gap-4 w-[25rem]">
    <div>
      <span class="font-medium text-surface-900 dark:text-surface-0 block ">Notifications</span>
    </div>
    <div>
      <ul class="list-none p-0 m-0 flex flex-col gap-4">
        <li class="flex items-center gap-2">
          <p-avatar
          label="N"
          styleClass="bg-indigo-600 text-white"
          shape="circle"
        />
          <div>
            <span class="font-medium">Title</span>
            <div class="text-sm text-muted-color">Description</div>
          </div>
        </li>
        <li class="flex items-center gap-2">
          <p-avatar
          label="N"
          styleClass="bg-indigo-600 text-white"
          shape="circle"
        />
          <div>
            <span class="font-medium">Title</span>
            <div class="text-sm text-muted-color">Description</div>
          </div>
        </li>

      </ul>
    </div>
  </div>
</p-popover>

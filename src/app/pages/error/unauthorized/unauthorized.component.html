<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="max-w-md w-full">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-red-100 rounded-full mb-4">
        <img  alt="logo" src="assets/images/logo/logo_transparent.png" />
      </div>
      <h1 class="text-4xl font-bold text-gray-900 mb-2">Page inexistante</h1>
      <p class="text-gray-600">Vous essayez d'accéder à une page qui n'existe pas.</p>
    </div>

    <p-card>
      <div class="space-y-4">
        <p class="text-gray-700">
          Si vous avez saisi l'URL manuellement, veuillez vérifier qu'elle est correcte. Si vous
          pensez qu'il s'agit d'une erreur, veuillez contacter votre administrateur.
        </p>

        <div class="flex gap-3">
          <p-button
            label="Retour au tableau de bord"
            icon="pi pi-home"
            (onClick)="goToDashboard()"
            styleClass="flex-1"
          />
          <p-button
            label="Se déconnecter"
            icon="pi pi-sign-out"
            severity="secondary"
            (onClick)="logout()"
            styleClass="flex-1"
          />
        </div>
      </div>
    </p-card>
  </div>
</div>

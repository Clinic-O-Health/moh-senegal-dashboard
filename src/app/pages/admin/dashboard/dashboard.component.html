<div class="space-y-6">
	<div class="flex items-center justify-between">
		<h1 class="text-2xl md:text-3xl font-bold text-gray-900">Tableau de bord</h1>
		<span class="text-sm text-gray-500" *ngIf="loading">Chargement…</span>
	</div>

	<!-- KPIs -->
	<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
		<div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
			<p class="text-sm text-gray-600">Ménages</p>
			<p class="text-3xl font-bold text-gray-900 mt-1">{{ totalHouseholds }}</p>
		</div>
		<div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
			<p class="text-sm text-gray-600">Patients</p>
			<p class="text-3xl font-bold text-gray-900 mt-1">{{ totalPatients }}</p>
		</div>
		<div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
			<p class="text-sm text-gray-600">Prédépistages à risque</p>
			<p class="text-3xl font-bold text-amber-700 mt-1">{{ highRiskCount }}</p>
		</div>
		<div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
			<p class="text-sm text-gray-600">HTA élevées</p>
			<p class="text-3xl font-bold text-red-700 mt-1">{{ htaElevated }}</p>
		</div>
		<div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
			<p class="text-sm text-gray-600">Glycémie élevée</p>
			<p class="text-3xl font-bold text-red-700 mt-1">{{ diabeteElevated }}</p>
		</div>
	</div>
</div>
